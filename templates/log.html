<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Logboek</title>
  <link rel="stylesheet" href="static\style.css" />
</head>
<body>

  <!-- Header / Navbar -->
  <header class="navbar">
    <div class="navbar__left">
      <a class="logo">Auto verbruik tracker</a>
    </div>
    <nav class="navbar__right">
      <a href={{url_for("home")}} class="nav-link">Dashboard</a>
      <a href={{url_for("autos")}} class="nav-link">Autos</a>
      <a href={{url_for("logout")}} class="nav-link">Uitloggen</a>
    </nav>
  </header>

  <!-- Hoofdsectie -->
  <main class="shell">
    <section class="board">

      <!-- Bovenste regel: dropdown (links), titel (midden), datum (rechts) -->
      <div class="board__bar">
        <div class="board__left">
          <label class="sr-only" for="filter">Filter</label>
          <select id="filter" class="select">
            <option selected>Auto</option>
            <option>Optie 1</option>
            <option>Optie 2</option>
            <option>Optie 3</option>
          </select>
        </div>

        <h2 class="board__title">Logboek</h2>

        <div class="board__right">
          <label class="sr-only" for="datum">Datum</label>
          <input id="datum" class="input" type="date" placeholder="Datum" />
        </div>
      </div>

      <!-- Lijst-gebied -->
      <div class="board__list">
        <div class="placeholder">List</div>
        <!--
          Hier kun je later je echte logregels renderen (UL/LI of cards).
        -->
      </div>

    </section>
  </main>

</body>
</html>
