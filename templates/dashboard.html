<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto verbruik tracker</title>
    <link rel="stylesheet" href="static\style.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>
<header class="navbar">
    <div class="navbar__left">
      <a class="logo">Auto verbruik tracker</a>
    </div>
    <nav class="navbar__right">
      <a href={{url_for("log")}} class="nav-link">Logboek</a>
      <a href={{url_for("cars")}} class="nav-link">Autos</a>
      <a href={{url_for("logout")}} class="nav-link">Uitloggen</a>
    </nav>
  </header>

<main class="container">

    <!-- Linker kolom -->
    <section class="left-panel">
        <div class="box">
            <form method="post">
                <input type="date" placeholder="Datum" name= "refuel_date" value ="{{ maxDate }}" max="{{ maxDate }}" required>
                <input type="number" placeholder="kilometerstand" name="kilometers" min="{{ maxKilometers }}" required>
                <select name="fuel_type" required>
                    {% if fuelTypes %}
                        {% for fuel in fuelTypes %}
                            <option name='fuel_type' value='{{ fuel }}'>{{ fuel }}</option>
                        {% endfor %}
                    {% endif %}
                </select>
                <input type="number" placeholder="Liters getankt" name="refuel_liters" required>
                <button class="btn" name="btn" value="Toevoegen" type="submit" formaction="{{ url_for('add_refuel') }}">Toevoegen</button>
            </form>
        </div>

        <div class="box">
            <form method="post">
                <label for="mindate">Exporteer van</label>
                <input type="date" name="mindate" min="{{ minDate }}" max="{{ maxDate }}" required>
                <label for="maxdate">tot</label>
                <input type="date" name="maxdate" min="{{ minDate }}" max="{{ maxDate }}" required>
                <select name="export_format">
                    <option>Exporteer als</option>
                    <option value="xlsx">xlsx</option>
                    <option value="csv">csv</option>
                </select>
                <button class="btn" name="btn" value="Exporteer" type="submit" formaction="{{ url_for('export') }}">Exporteer</button>
            </form>
        </div>
    </section>

    <!-- Bovenste info blok -->
    <section class="top-info">
        <form method="post">
            <div class="stat-box stat-select">
                <span class="stat-label">Geselecteerde auto</span>

                <select name="car_select" class="car-select" onchange="this.form.submit()">
                    {% if cars %}
                        {% for car in cars %}
                            <option name='car_select' value='{{ car[0] }}' {% if car[0] == activeCar %}selected{% endif %}>{{ car[0] }}</option>
                        {% endfor %}
                    {% else %}
                        <option>Geen autos beschikbaar</option>
                    {% endif %}
                </select>
            </div>
        </form>
        
        <div class="top-stats">

            <div class="stat-box">
                <span class="stat-label">Laatste tankbeurt</span>
                <span class="stat-value">{{ lastRefuelDate }}</span>
            </div>

            <div class="stat-box">
                <span class="stat-label">Laatste verbruik</span>
                <span class="stat-value">{{ lastUsage }}</span>
            </div>

            <div class="stat-box">
                <span class="stat-label">Gem. verbruik</span>
                <span class="stat-value">{{ avrUsage }}</span>
            </div>

        </div>

    </section>

    <!-- Grafiek -->
    <section class="chart">
        <canvas id="verbruikChart"></canvas>
    </section>


</main>

<script>
    // Dummy data – kunnen we later dynamisch maken
    const ctx = document.getElementById('verbruikChart').getContext('2d');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: JSON.parse('{{ fuelDates | tojson | safe }}'), //Datums
            datasets: [{
                label: 'Brandstofverbruik (L:KM)',
                data: JSON.parse('{{ fuelUsages | tojson | safe }}'), //Verbruik
                borderColor: '#ff6b4a',
                backgroundColor: 'rgba(255,107,74,0.2)',
                borderWidth: 3,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { beginAtZero: false }
            }
        }
    });
</script>
</body>
</html>
