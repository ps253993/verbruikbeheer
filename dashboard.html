<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto verbruik tracker</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<header class="navbar">
    <h1 class="logo">Auto verbruik tracker</h1>
    <nav>
        <a href="log.html">Logboek</a>
        <a href="#">Autos</a>
    </nav>
</header>

<main class="container">

    <!-- Linker kolom -->
    <section class="left-panel">
        <div class="box">
            <input type="date" placeholder="Datum">
            <input type="number" placeholder="kilometerstand">
            <select>
                <option>Brandstof type</option>>
            </select>
            <input type="number" placeholder="Liters getankt">
            <button class="btn">Toevoegen</button>
        </div>

        <div class="box">
            <label for="mindatum">Exporteer van</label>
            <input type="date" name="mindatum">
            <label for="maxdatum">tot</label>
            <input type="date" name="maxdatum">
            <select>
                <option>Exporteer als</option>
                <option value="xlsx">xlsx</option>
                <option value="csv">csv</option>
            </select>
            <button class="btn">Exporteer</button>
        </div>
    </section>

    <!-- Bovenste info blok -->
    <section class="top-info">
        <select>
            <option>Auto</option>
        </select>
        <div class="info-box">Laatste Tankbeurt</div>
        <div class="info-box">Laatste verbruik</div>
        <div class="info-box">Gem. verbruik</div>
    </section>

    <!-- Grafiek -->
    <section class="chart">
        <canvas id="verbruikChart"></canvas>
    </section>


</main>

<script>
    // Dummy data – kunnen we later dynamisch maken
    const ctx = document.getElementById('verbruikChart').getContext('2d');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ["Jan", "Feb", "Mrt", "Apr", "Mei", "Jun"],
            datasets: [{
                label: 'Brandstofverbruik (L/100km)',
                data: [6.5, 6.8, 6.2, 7.0, 6.4, 6.1],
                borderColor: '#ff6b4a',
                backgroundColor: 'rgba(255,107,74,0.2)',
                borderWidth: 3,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { beginAtZero: false }
            }
        }
    });
</script>

</body>
</html>
